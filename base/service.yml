apiVersion: v1
kind: Service
metadata:
  name: image-collor-service
  labels:
    app: image-collor
spec:
  type: ClusterIP # Mantemos ClusterIP para comunicação interna padrão
  selector:
    app: image-collor # Este seletor deve bater exatamente com a label do Deployment
  ports:
    - protocol: TCP
      port: 80 # Porta exposta pelo Service
      targetPort: 80 # Porta em que o container está escutando
